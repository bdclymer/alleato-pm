        sync: false

  # Backend AI provider canary. The intelligence pipeline (meeting extraction
  # and project synthesis) must not swallow LLM failures into empty
  # results, so an OpenAI quota/auth outage is invisible — it looked like "no
  # signal" for ~5 days ending 2026-06-14 (memory: incident-openai-quota-
  # backend-ai-down). This issues a cheap 1-token completion every 2 hours and
  # exits non-zero + posts to SLACK_WEBHOOK_URL on insufficient_quota / 401 /
  # rate_limit, so a billing/key outage surfaces within hours, not days.
  - type: cron
    name: alleato-ai-provider-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Hourly (was every 2h) so a quota/billing outage is caught within the hour,
    # not after half a day of burn.
    schedule: "20 * * * *"
    dockerCommand: python3 -m src.services.health.ai_provider_health
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      # Slack incoming webhook (set via Render API 2026-06-14). Secondary record.
      - key: SLACK_WEBHOOK_URL
        sync: false
      # Teams DM alert (primary — the channel the owner actually watches). The
      # health check POSTs to {NEXT_PUBLIC_APP_URL}/api/bot/proactive/teams with
      # NOTIFICATION_SERVICE_KEY. Secrets live in Render only.
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NOTIFICATION_SERVICE_KEY
        sync: false
      - key: AI_HEALTH_ALERT_TEAMS_USER_ID
        sync: false

  # Checks source freshness, embedding backlog, compiler backlog, and persisted
  # alerts for every RAG source multiple times per day.
  - type: cron
    name: alleato-source-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "*/5 * * * *"
    dockerCommand: python3 -m src.services.health.source_rag_health
