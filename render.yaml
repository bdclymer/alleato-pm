# Render deployment configuration for Alleato-Procore
# This file should be in the repository root for Render to auto-detect
services:
  - type: cron
    name: alleato-acumatica-financial-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 */2 * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.acumatica_sync import run_acumatica_financial_sync;
      result = run_acumatica_financial_sync();
      print(json.dumps(result, indent=2, default=str));
      sys.exit(1 if result.get('status') == 'error' else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ACUMATICA_BASE_URL
        sync: false
      - key: ACCOUNTING_USER
        sync: false
      - key: ACCOUNTING_PASSWORD
        sync: false
      - key: ACUMATICA_FINANCIAL_SYNC_ENABLED
        value: "true"

  - type: cron
    name: alleato-source-sync-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "*/30 * * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.scheduler import _run_source_sync_health_recompute;
      result = _run_source_sync_health_recompute();
      print(json.dumps(result, indent=2));
      health = result.get('health', {});
      sys.exit(1 if health.get('status') == 'critical' else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: alleato-teams-channel-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "10 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false

  - type: cron
    name: alleato-teams-dm-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "40 * * * *"
    dockerCommand: >-
      timeout 10m python3 src/scripts/run_graph_sync_phase.py teams-dm --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: TEAMS_DM_SYNC_MAX_USERS
        value: "1"
      - key: TEAMS_DM_EXPORT_PAGE_SIZE
        value: "25"
      - key: TEAMS_DM_EXPORT_MAX_PAGES
        value: "2"

  # Runs Outlook/OneDrive/SharePoint sync every 2 hours, staggered away from
  # Teams-only crons. Embedding is capped at 25 documents per run.
  - type: cron
    name: alleato-graph-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "20 */2 * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.integrations.microsoft_graph.sync import run_graph_sync;
      from src.services.supabase_helpers import get_supabase_client;
      result = run_graph_sync(
        get_supabase_client(),
        run_teams=False,
        run_embedding=True,
        run_teams_compiler=False,
        embed_limit=25,
        teams_compiler_batch_size=25,
      );
      print(json.dumps(result, indent=2));
      errors = result.get('errors', []);
      sys.exit(1 if errors and result.get('total_synced', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: GRAPH_SYNC_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "true"
      - key: GRAPH_SYNC_TEAMS
        value: "false"
      - key: GRAPH_SYNC_TEAMS_DM
        value: "false"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "true"
      - key: GRAPH_EMBEDDING_LIMIT
        value: "25"
      - key: TEAMS_COMPILER_BATCH_SIZE
        value: "25"

  # Generates AI daily project recap (saved to daily_recaps table) from
  # meeting transcripts of the prior 24 hours. Runs daily at 09:30 UTC
  # (~5:30 AM ET) so a fresh recap is ready before the executive daily brief
  # cron fires at 11/12 UTC (~7 AM ET). Without this cron, the CEO Daily Brief
  # reads stale recaps.
  - type: cron
    name: alleato-daily-recap
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "30 9 * * *"
    dockerCommand: >-
      python3 /app/scripts/generate_daily_recap.py --days 1 --verbose
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services:/app/src/workers
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Extracts action items from meetings, emails, and Teams messages daily at 7 AM UTC.
  # Replaces the former Vercel cron route (/api/admin/cron/extract-brandon-tasks).
  - type: cron
    name: alleato-task-extraction
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 7 * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.task_extraction import run_task_extraction;
      result = run_task_extraction(window_days=2, max_docs=25);
      print(json.dumps(result, indent=2));
      sys.exit(1 if result.get('errors', 0) > 0 and result.get('inserted', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: TASK_EXTRACTION_MAX_DOCS
        value: "25"
      - key: TASK_EXTRACTION_MAX_RUN_DOCS
        value: "25"
      - key: TASK_EXTRACTION_CANDIDATE_LIMIT
        value: "100"
      - key: TASK_EXTRACTION_DESCRIPTION_LIMIT
        value: "1000"
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Runs RAG meeting vectorization health check daily at noon UTC.
  # Replaces the former GitHub Actions workflow — no Actions minutes consumed.
  # Posts to SLACK_WEBHOOK_URL on failure.
  - type: cron
    name: alleato-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "15 12 * * *"
    dockerCommand: python3 -m src.services.health.rag_meeting_health
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false

  # Checks source freshness, embedding backlog, compiler backlog, task extraction,
  # and persisted alerts for every RAG source multiple times per day.
  - type: cron
    name: alleato-source-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "5 */4 * * *"
    dockerCommand: python3 -m src.services.health.source_rag_health
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: RAG_HEALTH_REMEDIATION_WEBHOOK_URL
        sync: false
      - key: RAG_HEALTH_REMEDIATION_WEBHOOK_TOKEN
        sync: false

  # Scheduled periodic packet refresh — guarantees intelligence packets are
  # never older than ~6h regardless of source-signal activity. The owner
  # briefing depends on fresh packets; without this, projects with quiet
  # comms sit stale indefinitely.
  # Runs 4x/day in UTC: 02:00, 09:00, 15:00, 21:00.
  # 09:00 UTC fires ~1h before the 11:00 UTC executive briefing morning cron,
  # so the briefing always reads packets refreshed within the last ~1h.
  - type: cron
    name: alleato-packet-refresh-periodic
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 2,9,15,21 * * *"
    dockerCommand: >-
      python3 src/scripts/enqueue_periodic_packet_refresh.py
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services:/app/src/workers
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"

  # Domain (company_process) packet compiler — synthesizes cross-project
  # communications about a single business function (accounting, operations,
  # business development, people & talent) into an intelligence_packets row
  # plus recurring-issue insight_cards. Powers the AI assistant's
  # getDomainIntelligence tool for questions like "what's going on with
  # accounting?". Runs 4×/day, staggered 30m after the project-level
  # packet refresh cron so domain compilation reads the freshest source data.
  - type: cron
    name: alleato-domain-packet-compiler
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "30 2,9,15,21 * * *"
    dockerCommand: >-
      python3 src/scripts/run_domain_packet_compiler.py --lookback-days 60 --doc-limit 150
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DOMAIN_PACKET_LOOKBACK_DAYS
        value: "60"
      - key: DOMAIN_PACKET_DOC_LIMIT
        value: "150"
      - key: DOMAIN_PACKET_MODEL
        value: "gpt-5.4-mini"

  # DEACTIVATED 2026-05-18 — Executive Daily Brief Teams delivery turned off
  # at user request. Both crons (morning + evening) are suspended in Render and
  # removed from this file so they will not be re-created on deploy. The
  # Next.js delivery endpoint (/api/executive/daily-brief/send-teams) is also
  # gated by EXECUTIVE_DAILY_BRIEF_ENABLED in
  # frontend/scripts/run-executive-daily-brief.ts and the route itself.
  # To re-enable: restore these cron blocks, unsuspend in Render, and set
  # EXECUTIVE_DAILY_BRIEF_ENABLED=true in Vercel + Render env.
  # (previous service IDs: crn-d827chojs32c73doj780 morning,
  #  crn-d827cijbc2fs73c3uqsg evening)

  - type: web
    name: alleato-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services:/app/src/workers
      - key: PYTHONUNBUFFERED
        value: 1
      # The web service should only serve API traffic. Background sync jobs run
      # as explicit Render cron services so they can be suspended/throttled.
      - key: DISABLE_SCHEDULER
        value: true
      - key: GRAPH_SYNC_ENABLED
        value: false
      - key: GRAPH_SYNC_OUTLOOK
        value: false
      - key: GRAPH_SYNC_TEAMS
        value: false
      - key: GRAPH_SYNC_TEAMS_DM
        value: false
      - key: GRAPH_SYNC_ONEDRIVE
        value: false
      - key: INTELLIGENCE_COMPILER_ENABLED
        value: false
      - key: SOURCE_SYNC_HEALTH_RECOMPUTE_ENABLED
        value: false
      - key: FIREFLIES_PIPELINE_BACKLOG_ENABLED
        value: false
      - key: TASK_EXTRACTION_ENABLED
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: USE_UNIFIED_AGENT
        value: true
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_ENABLED
        value: true
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_RUNTIME
        value: deep_agents
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_MODEL
        value: gpt-5.4-mini
      - key: DEEP_AGENTS_RESEARCH_ENABLED
        value: true
      - key: DEEP_AGENTS_RESEARCH_MODEL
        value: gpt-5.4-mini
      - key: DEEP_AGENTS_CONTENT_BUILDER_ENABLED
        value: true
      - key: DEEP_AGENTS_CONTENT_BUILDER_MODEL
        value: gpt-5.4-mini
      - key: CONTENT_BUILDER_IMAGE_MODEL
        value: gemini-2.5-flash-image
      - key: DEEP_AGENTS_STANDALONE_TOOLS_ENABLED
        value: true
      - key: DEEP_AGENTS_SQL_TOOLS_ENABLED
