# NOTE: not blueprint-linked; live config is managed via Render API
# Render deployment configuration for Alleato-Procore
# This file should be in the repository root for Render to auto-detect
services:
  - type: cron
    name: alleato-acumatica-financial-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 */2 * * *"
    dockerCommand: >-
      python3 scripts/run_acumatica_financial_sync.py
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ACUMATICA_BASE_URL
        sync: false
      - key: ACCOUNTING_USER
        sync: false
      - key: ACCOUNTING_PASSWORD
        sync: false
      - key: ACUMATICA_FINANCIAL_SYNC_ENABLED
        value: "true"

  - type: cron
    name: alleato-source-sync-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "*/30 * * * *"
    dockerCommand: >-
      python3 -c "import asyncio; from src.services.health.source_sync_health import _run_source_sync_health_recompute; asyncio.run(_run_source_sync_health_recompute())"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: alleato-teams-channel-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "10 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams --skip-embedding
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: GRAPH_DELTA_MAX_PAGES
        value: "3"
      - key: GRAPH_DELTA_MAX_ITEMS
        value: "250"
      - key: TEAMS_CHANNEL_SYNC_MAX_CHANNELS
        value: "3"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false

  - type: cron
    name: alleato-teams-dm-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "40 * * * *"
    dockerCommand: >-
      timeout 10m python3 src/scripts/run_graph_sync_phase.py teams-dm --skip-embedding
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: GRAPH_DELTA_MAX_PAGES
        value: "3"
      - key: GRAPH_DELTA_MAX_ITEMS
        value: "250"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: TEAMS_DM_SYNC_MAX_USERS
        value: "1"
      - key: TEAMS_DM_EXPORT_PAGE_SIZE
        value: "25"
      - key: TEAMS_DM_EXPORT_MAX_PAGES
        value: "2"

  # Runs Outlook/SharePoint sync every 2 hours, staggered away from
  # Teams-only crons. Embedding is capped at 25 documents per run.
  - type: cron
    name: alleato-graph-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "20 */2 * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.integrations.microsoft_graph.sync import run_graph_sync;
      from src.services.supabase_helpers import get_supabase_client;
      result = run_graph_sync(
        get_supabase_client(),
        run_teams=False,
        run_embedding=True,
        run_teams_compiler=False,
        embed_limit=25,
        teams_compiler_batch_size=25,
      );
      print(json.dumps(result, indent=2));
      errors = result.get('errors', []);
      sys.exit(1 if errors and result.get('total_synced', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: OUTLOOK_SYNC_MAX_USERS
        value: "1"
      - key: SHAREPOINT_SYNC_MAX_FOLDERS
        value: "2"
      - key: GRAPH_SYNC_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "true"
      - key: GRAPH_SYNC_TEAMS
        value: "false"
      - key: GRAPH_SYNC_TEAMS_DM
        value: "false"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "false"
      - key: GRAPH_SYNC_SHAREPOINT
        value: "true"
      - key: GRAPH_EMBEDDING_LIMIT
        value: "25"
      - key: TEAMS_COMPILER_BATCH_SIZE
        value: "25"

  # Syncs new Fireflies meeting transcripts every 30 minutes.
  # Replaced the former APScheduler-based Fireflies sync that was disabled
  # when DISABLE_SCHEDULER=true was set on alleato-backend. Without this cron,
  # new meetings only get ingested when manually triggered.
  - type: cron
    name: alleato-fireflies-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "15 * * * *"
    dockerCommand: >-
      env FIREFLIES_REWRITE_TASKS_DURING_INGEST=false timeout 20m python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.scheduler import _run_fireflies_sync;
      result = _run_fireflies_sync(limit=25);
      print(json.dumps(result if isinstance(result, dict) else {'result': str(result)}, indent=2, default=str));
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: ALLOW_PM_APP_FINAL_PROJECTIONS
        value: "true"
      - key: PM_APP_PROJECTION_MAX_TOTAL_ROWS
        value: "50"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: FIREFLIES_API_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Daily email triage digest — 7:00 AM ET (12:00 UTC). Queries yesterday's
