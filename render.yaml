# Render deployment configuration for Alleato-Procore
# This file should be in the repository root for Render to auto-detect
services:

  - type: cron
    name: alleato-acumatica-financial-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-acumatica-financial-sync disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ACUMATICA_BASE_URL
        sync: false
      - key: ACCOUNTING_USER
        sync: false
      - key: ACCOUNTING_PASSWORD
        sync: false
      - key: ACUMATICA_FINANCIAL_SYNC_ENABLED
        value: "true"

  - type: cron
    name: alleato-source-sync-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-source-sync-health disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: alleato-teams-channel-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-teams-channel-sync disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false

  - type: cron
    name: alleato-teams-dm-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-teams-dm-sync disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false

  # Runs Microsoft Graph sync (Outlook, Teams, OneDrive) every 30 minutes.
  # Staggered to :05/:35 so it doesn't collide with teams-channel-sync at :00/:30.
  # embed_limit is capped at 25 per run to avoid OOM-killing the DB with bulk vector writes.
  - type: cron
    name: alleato-graph-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-graph-sync disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: GRAPH_SYNC_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "true"
      - key: GRAPH_SYNC_TEAMS
        value: "true"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "true"

  # Extracts action items from meetings, emails, and Teams messages daily at 7 AM UTC.
  # Replaces the former Vercel cron route (/api/admin/cron/extract-brandon-tasks).
  - type: cron
    name: alleato-task-extraction
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-task-extraction disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Runs RAG meeting vectorization health check daily at noon UTC.
  # Replaces the former GitHub Actions workflow — no Actions minutes consumed.
  # Posts to SLACK_WEBHOOK_URL on failure.
  - type: cron
    name: alleato-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: echo "alleato-rag-health disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false

  # Checks source freshness, embedding backlog, compiler backlog, task extraction,
  # and persisted alerts for every RAG source multiple times per day.
  - type: cron
    name: alleato-source-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 0 1 1 *"
    dockerCommand: echo "alleato-source-rag-health disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_HEALTH_REMEDIATION_WEBHOOK_URL
        sync: false
      - key: RAG_HEALTH_REMEDIATION_WEBHOOK_TOKEN
        sync: false

  # Generates the approved executive Daily Brief on Render and then sends the
  # stored packet to Teams through a short-lived delivery endpoint.
  - type: cron
    name: alleato-executive-daily-brief-morning
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.executive-brief
    dockerContext: .
    schedule: "0 0 1 1 *"
    dockerCommand: echo "alleato-executive-daily-brief-morning disabled while DB incident guard is active"
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EXECUTIVE_DAILY_BRIEF_FRONTEND_BASE_URL
        value: https://projects.alleatogroup.com
      - key: EXECUTIVE_DAILY_BRIEF_SEND_TEAMS
        value: "false"
      - key: EXECUTIVE_DAILY_BRIEF_SCHEDULE
        value: "weekday-morning-0700-et"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_TIMEZONE
        value: America/New_York
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_LOCAL_TIME
        value: "07:00"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_WEEKDAYS
        value: "1,2,3,4,5"

  - type: cron
    name: alleato-executive-daily-brief-evening
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.executive-brief
    dockerContext: .
    schedule: "0 0 1 1 *"
    dockerCommand: echo "alleato-executive-daily-brief-evening disabled while DB incident guard is active"
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EXECUTIVE_DAILY_BRIEF_FRONTEND_BASE_URL
        value: https://projects.alleatogroup.com
      - key: EXECUTIVE_DAILY_BRIEF_SEND_TEAMS
        value: "false"
      - key: EXECUTIVE_DAILY_BRIEF_SCHEDULE
        value: "weekday-evening-1830-et"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_TIMEZONE
        value: America/New_York
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_LOCAL_TIME
        value: "18:30"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_WEEKDAYS
        value: "1,2,3,4,5"

  - type: web
    name: alleato-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services:/app/src/workers
      - key: PYTHONUNBUFFERED
        value: 1
      # The web service should only serve API traffic. Background sync jobs run
      # as explicit Render cron services so they can be suspended/throttled.
      - key: DISABLE_SCHEDULER
        value: true
      - key: GRAPH_SYNC_ENABLED
        value: false
      - key: GRAPH_SYNC_OUTLOOK
        value: false
      - key: GRAPH_SYNC_TEAMS
        value: false
      - key: GRAPH_SYNC_TEAMS_DM
        value: false
      - key: GRAPH_SYNC_ONEDRIVE
        value: false
      - key: INTELLIGENCE_COMPILER_ENABLED
        value: false
      - key: SOURCE_SYNC_HEALTH_RECOMPUTE_ENABLED
        value: false
      - key: FIREFLIES_PIPELINE_BACKLOG_ENABLED
        value: false
      - key: TASK_EXTRACTION_ENABLED
        value: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: USE_UNIFIED_AGENT
        value: true
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_ENABLED
        value: false
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_RUNTIME
        value: contract_spike
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_MODEL
        value: gpt-5.4-mini
      - key: CORS_ORIGINS
        value: https://alleato-procore.vercel.app,https://www.alleato-procore.vercel.app,https://alleato-pm-1.onrender.com
