  # Domain (company_process) packet compiler — synthesizes cross-project
  # communications about a single business function (accounting, operations,
  # business development, people & talent) into an intelligence_packets row
  # plus recurring-issue insight_cards. Powers the AI assistant's
  # getDomainIntelligence tool for questions like "what's going on with
  # accounting?". Runs 4×/day, staggered 30m after the project-level
  # packet refresh cron so domain compilation reads the freshest source data.
  - type: cron
    name: alleato-domain-packet-compiler
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "30 2,9,15,21 * * *"
    dockerCommand: >-
      python3 src/scripts/run_domain_packet_compiler.py --lookback-days 60 --doc-limit 150
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DOMAIN_PACKET_LOOKBACK_DAYS
        value: "60"
      - key: DOMAIN_PACKET_DOC_LIMIT
        value: "150"
      - key: DOMAIN_PACKET_MODEL
        value: "gpt-5.4-mini"

  # Project communications intelligence — DAILY BACKSTOP. The PRIMARY path is now
  # event-driven: synthesize_new_comms_since() runs inline at the end of every
  # graph-sync, turning newly-ingested email/Teams docs into cards + L2 synthesis
  # in the same cycle they arrive. This once-daily sweep is the safety net: it
  # covers ALL active projects (no first-10 cap) and re-checks for anything the
  # inline path missed. Cheap by construction — the candidate-based skip means
  # already-processed docs cost nothing, and the empty-delta L2 guard means
  # unchanged projects cost nothing. (Was every 2h, which blindly re-scanned the
  # same first 10 projects and re-ran L2 on quiet projects — both fixed.)
  - type: cron
    name: alleato-project-synthesis-sweep
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 7 * * *"
    dockerCommand: >-
      python3 -m src.services.intelligence.project_synthesizer
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: ALLOW_PM_APP_FINAL_PROJECTIONS
        value: "true"
      - key: PM_APP_PROJECTION_MAX_TOTAL_ROWS
        value: "100"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SYNTHESIS_SWEEP_MAX_PROJECTS
        value: "200"
      - key: SYNTHESIS_SWEEP_MAX_EXTRACTIONS
        value: "25"
      - key: SYNTHESIS_SWEEP_SINCE_DAYS
        value: "14"

  # DEACTIVATED 2026-05-18 — Executive Daily Brief Teams delivery turned off
  # at user request. Both crons (morning + evening) are suspended in Render and
  # removed from this file so they will not be re-created on deploy. The
  # Next.js delivery endpoint (/api/executive/daily-brief/send-teams) is also
  # gated by EXECUTIVE_DAILY_BRIEF_ENABLED in
  # frontend/scripts/run-executive-daily-brief.ts and the route itself.
  # To re-enable: restore these cron blocks, unsuspend in Render, and set
  # EXECUTIVE_DAILY_BRIEF_ENABLED=true in Vercel + Render env.
  # (previous service IDs: crn-d827chojs32c73doj780 morning,
  #  crn-d827cijbc2fs73c3uqsg evening)

  - type: web
    name: alleato-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services:/app/src/workers
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: ALLOW_PM_APP_FINAL_PROJECTIONS
        value: "true"
      - key: PM_APP_PROJECTION_MAX_TOTAL_ROWS
        value: "50"
      - key: ALLEATO_SYSTEM_MCP_ENABLED
        value: "true"
      - key: ALLEATO_SYSTEM_MCP_BEARER_TOKEN
        sync: false
      # The web service should only serve API traffic. Background sync jobs run
      # as explicit Render cron services so they can be suspended/throttled.
      - key: BACKEND_API_ONLY
        value: "true"
      - key: DISABLE_SCHEDULER
        value: "true"
      - key: GRAPH_API_INGESTION_ENABLED
        value: "false"
      - key: GRAPH_SYNC_ENABLED
        value: "false"
      - key: GRAPH_SUBSCRIPTIONS_ENABLED
        value: "auto"
      - key: GRAPH_WEBHOOK_DRAIN_ENABLED
        value: "auto"
      - key: GRAPH_SYNC_OUTLOOK
        value: "false"
      - key: GRAPH_SYNC_TEAMS
        value: "false"
      - key: GRAPH_SYNC_TEAMS_DM
        value: "false"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "false"
      - key: INTELLIGENCE_COMPILER_ENABLED
        value: "false"
      - key: SOURCE_SYNC_HEALTH_RECOMPUTE_ENABLED
        value: "false"
      - key: FIREFLIES_PIPELINE_BACKLOG_ENABLED
        value: "false"
      - key: TASK_EXTRACTION_ENABLED
        value: "false"
      # Deep full-transcript meeting extraction (Stage 3). Enabled in prod via the
      # Render API 2026-06-10; declared here so a Blueprint sync keeps it on.
      - key: DEEP_EXTRACTION_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      # Backend Sentry DSN (set via Render API 2026-06-14). init_sentry() in
      # src/services/sentry_monitoring.py reads SENTRY_BACKEND_DSN || SENTRY_DSN;
      # without it backend exceptions go uncaptured — which is how the OpenAI
      # quota outage stayed invisible. Declared here so a Blueprint sync keeps it.
      - key: SENTRY_BACKEND_DSN
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: USE_UNIFIED_AGENT
        value: true
      - key: DEEP_AGENTS_RESEARCH_ENABLED
        value: true
      - key: DEEP_AGENTS_RESEARCH_MODEL
        value: gpt-5.4-mini
      - key: DEEP_AGENTS_APP_EXPERT_ENABLED
        value: true
      - key: DEEP_AGENTS_APP_EXPERT_MODEL
        value: gpt-5.4-mini
      - key: DEEP_AGENTS_MICROSOFT_EXECUTIVE_ASSISTANT_ENABLED
        value: true
      - key: DEEP_AGENTS_MICROSOFT_EXECUTIVE_ASSISTANT_MODEL
        value: gpt-5.4-mini
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_WEBHOOK_ENABLED
        value: "true"
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_EVENT_MAX_MESSAGES
        value: "10"
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_MAILBOX
        sync: false
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_TEAMS_USER_ID
        sync: false
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_AUTO_DRAFT
        value: "true"
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_AUTO_TEAMS_ALERT
        value: "true"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: NOTIFICATION_SERVICE_KEY
        sync: false
      - key: DEEP_AGENTS_CONTENT_BUILDER_ENABLED
        value: true
      - key: DEEP_AGENTS_CONTENT_BUILDER_MODEL
        value: gpt-5.4-mini
      - key: CONTENT_BUILDER_IMAGE_MODEL
        value: gemini-2.5-flash-image
      - key: DEEP_AGENTS_DOCS_RESEARCH_ENABLED
        value: true
      - key: DEEP_AGENTS_DOCS_RESEARCH_MODEL
        value: gpt-5.4-mini
      - key: LANGCHAIN_DOCS_MCP_URL
        value: https://docs.langchain.com/mcp
      - key: DEEP_AGENTS_LLM_WIKI_ENABLED
        value: true
      - key: DEEP_AGENTS_LLM_WIKI_MODEL
        value: gpt-5.4-mini
      # Deep-agent filesystem artifacts (LLM wiki / deep-research archive, docs
      # research, content builder) MUST live on the persistent disk below — not
      # /tmp — or every redeploy wipes saved "research and past work".
      - key: LLM_WIKI_OUTPUT_ROOT
        value: /data/llm-wiki
      - key: DOCS_RESEARCH_OUTPUT_ROOT
        value: /data/docs-research
      - key: CONTENT_BUILDER_OUTPUT_ROOT
        value: /data/content-builder
      - key: DEEP_AGENTS_MEMORY_ENABLED
        value: true
      - key: DEEP_AGENTS_STANDALONE_TOOLS_ENABLED
        value: true
      - key: DEEP_AGENTS_SQL_TOOLS_ENABLED
        value: true
      - key: DEEP_AGENTS_ACUMATICA_TOOLS_ENABLED
        value: true
      - key: DEEP_AGENTS_DRAFT_TOOLS_ENABLED
        value: true
      - key: DEEP_AGENTS_SUBAGENTS_ENABLED
        value: true
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: FRONTEND_CORS_ORIGINS
        value: https://alleato-procore.vercel.app,https://www.alleato-procore.vercel.app,https://alleato-backend-rbnj.onrender.com
    # Persistent disk for deep-agent artifacts. A disk pins the service to a
    # single instance and switches deploys to recreate (acceptable for this API).
    disk:
      name: deep-agents-data
      mountPath: /data
      sizeGB: 1
