# Render deployment configuration for Alleato-Procore
# This file should be in the repository root for Render to auto-detect
services:

  - type: cron
    name: alleato-acumatica-financial-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "15 0 * * *"
    dockerCommand: >-
      python3 -c "
      import json, os, sys;
      sys.path.insert(0, '/app');
      from src.services.acumatica_sync import run_acumatica_financial_sync;
      result = run_acumatica_financial_sync();
      print(json.dumps(result, indent=2));
      sys.exit(1 if result.get('errors') else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ACUMATICA_BASE_URL
        sync: false
      - key: ACCOUNTING_USER
        sync: false
      - key: ACCOUNTING_PASSWORD
        sync: false
      - key: ACUMATICA_FINANCIAL_SYNC_ENABLED
        value: "true"

  - type: cron
    name: alleato-source-sync-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "*/15 * * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.scheduler import _run_source_sync_health_recompute;
      result = _run_source_sync_health_recompute();
      print(json.dumps(result, indent=2));
      health = result.get('health', {});
      sys.exit(1 if health.get('status') != 'healthy' else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: alleato-teams-channel-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "*/30 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false

  - type: cron
    name: alleato-teams-dm-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "15,45 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams-dm --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false

  # Runs Microsoft Graph sync (Outlook, Teams, OneDrive) every 30 minutes.
  # Uses the same Docker image as the web service — runs the sync directly
  # without any HTTP call, so it works even when the web service is spun down.
  - type: cron
    name: alleato-graph-sync
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "*/30 * * * *"
    dockerCommand: >-
      python3 -c "
      import json, os, sys;
      sys.path.insert(0, '/app');
      from src.services.supabase_helpers import get_supabase_client;
      from src.services.integrations.microsoft_graph.sync import run_graph_sync;
      client = get_supabase_client();
      result = run_graph_sync(client);
      print(json.dumps(result, indent=2));
      errors = result.get('errors', []);
      sys.exit(1 if errors and result.get('total_synced', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: GRAPH_SYNC_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "true"
      - key: GRAPH_SYNC_TEAMS
        value: "true"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "true"

  # Extracts action items from meetings, emails, and Teams messages daily at 7 AM UTC.
  # Replaces the former Vercel cron route (/api/admin/cron/extract-brandon-tasks).
  - type: cron
    name: alleato-task-extraction
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "0 7 * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.task_extraction import run_task_extraction;
      result = run_task_extraction(window_days=2);
      print(json.dumps(result, indent=2));
      sys.exit(1 if result.get('errors', 0) > 0 and result.get('inserted', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Runs RAG meeting vectorization health check daily at noon UTC.
  # Replaces the former GitHub Actions workflow — no Actions minutes consumed.
  # Posts to SLACK_WEBHOOK_URL on failure.
  - type: cron
    name: alleato-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "15 12 * * *"
    dockerCommand: python3 -m src.services.health.rag_meeting_health
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false

  # Checks source freshness, embedding backlog, compiler backlog, task extraction,
  # and persisted alerts for every RAG source multiple times per day.
  - type: cron
    name: alleato-source-rag-health
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "5 */4 * * *"
    dockerCommand: python3 -m src.services.health.source_rag_health
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_HEALTH_REMEDIATION_WEBHOOK_URL
        sync: false
      - key: RAG_HEALTH_REMEDIATION_WEBHOOK_TOKEN
        sync: false

  # Generates the approved executive Daily Brief on Render and then sends the
  # stored packet to Teams through a short-lived delivery endpoint.
  - type: cron
    name: alleato-executive-daily-brief-morning
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.executive-brief
    dockerContext: .
    schedule: "0 11,12 * * 1-5"
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EXECUTIVE_DAILY_BRIEF_FRONTEND_BASE_URL
        value: https://projects.alleatogroup.com
      - key: EXECUTIVE_DAILY_BRIEF_SEND_TEAMS
        value: "false"
      - key: EXECUTIVE_DAILY_BRIEF_SCHEDULE
        value: "weekday-morning-0700-et"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_TIMEZONE
        value: America/New_York
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_LOCAL_TIME
        value: "07:00"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_WEEKDAYS
        value: "1,2,3,4,5"

  - type: cron
    name: alleato-executive-daily-brief-evening
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.executive-brief
    dockerContext: .
    schedule: "30 22,23 * * 1-5"
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: EXECUTIVE_DAILY_BRIEF_FRONTEND_BASE_URL
        value: https://projects.alleatogroup.com
      - key: EXECUTIVE_DAILY_BRIEF_SEND_TEAMS
        value: "false"
      - key: EXECUTIVE_DAILY_BRIEF_SCHEDULE
        value: "weekday-evening-1830-et"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_TIMEZONE
        value: America/New_York
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_LOCAL_TIME
        value: "18:30"
      - key: EXECUTIVE_DAILY_BRIEF_TARGET_WEEKDAYS
        value: "1,2,3,4,5"

  - type: web
    name: alleato-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services:/app/src/workers
      - key: PYTHONUNBUFFERED
        value: 1
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: USE_UNIFIED_AGENT
        value: true
      - key: CORS_ORIGINS
        value: https://alleato-procore.vercel.app,https://www.alleato-procore.vercel.app,https://alleato-pm-1.onrender.com
