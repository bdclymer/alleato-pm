    relatedTables:
      - projects

  - name: project_documents
    db: MAIN
    domain: projects
    owner: core
    status: live
    purpose: "Project-scoped uploaded + OneDrive/SharePoint-synced documents (full file inventory). Parallel to document_metadata (the AI-ready catalog). document_type is auto-derived from the source folder path."
    gotchas: "document_type is set by trigger trg_project_documents_classify via classify_document_type(source_web_url) — folder-name based, number-agnostic. Do not set it manually for synced files. category is a generic source label ('OneDrive Document'); document_type is the meaningful construction type (psr, schedule, pay_app, submittal, etc.)."
    notesForAi: "Holds the full categorized SharePoint/OneDrive file inventory (most files are NOT promoted into document_metadata). findProjectDocuments searches this in addition to document_metadata. Filter by document_type for PSR/schedule/pay_app/submittal/etc."
    relatedTables:
      - projects
      - document_metadata
      - document_type_taxonomy

