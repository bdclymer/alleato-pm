  - name: projects
    db: MAIN
    domain: projects
    owner: core
    status: live
    purpose: "Master project record. Integer id is the FK target for nearly every project-scoped table. Acumatica sync AND manual API can both write — race conditions possible."
    gotchas: "id is INTEGER (not UUID). Several columns are mostly null: address, city, state, client, current_phase. project_manager FK→people.id (uuid). team_members is uuid[]; stakeholders is JSONB."
    relatedTables:
      - projects_audit
      - project_companies
      - project_directory_memberships
      - intelligence_targets
      - intelligence_packets
    notesForAi: "Use projects.id (integer) not projects.uuid when joining to other tables. Acumatica sync updates acumatica_project_id and synced_at fields."

  - name: projects_audit
    db: MAIN
    domain: projects
    owner: system
    status: live
    purpose: "Append-only audit trail of changes to the projects table. Written by a Postgres trigger only — no app code touches it directly."
    gotchas: "Only useful via direct SQL. No UI. Cannot be queried via normal app routes."
    relatedTables:
      - projects

  - name: projects_sync
    db: MAIN
    domain: projects
    owner: unknown
    status: dormant
    purpose: "Leftover staging table from early project sync work. No code references found."
