    db: MAIN
    domain: documents
    owner: accounting
    status: live
    purpose: "SAIS structured backlog for missing or lifecycle-managed accounting/finance SOP requirements. Placeholder records exist before a real SOP file is uploaded, then optionally link to document_metadata once the final SOP exists."
    gotchas: "Do not create fake document_metadata rows for missing SOPs. Placeholder backlog rows are requirements, not uploaded files; AI retrieval must distinguish them from real documents."
    relatedTables:
      - document_metadata
      - projects
    notesForAi: "Use sop_backlog for questions about missing accounting/finance SOPs, documentation gaps, SOP priority, lifecycle state, owner, and linked-file status."

