# Render deployment configuration
services:
  - type: cron
    name: alleato-acumatica-financial-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "0 0 1 1 *"
    dockerCommand: >-
      echo "alleato-acumatica-financial-sync disabled while DB incident guard is active"
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ACUMATICA_BASE_URL
        sync: false
      - key: ACCOUNTING_USER
        sync: false
      - key: ACCOUNTING_PASSWORD
        sync: false
      - key: ACUMATICA_FINANCIAL_SYNC_ENABLED
        value: "true"

  - type: cron
    name: alleato-source-sync-health
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "*/30 * * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.scheduler import _run_source_sync_health_recompute;
      result = _run_source_sync_health_recompute();
      print(json.dumps(result, indent=2));
      health = result.get('health', {});
      sys.exit(1 if health.get('status') == 'critical' else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: alleato-teams-channel-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "10 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: GRAPH_DELTA_MAX_PAGES
        value: "3"
      - key: GRAPH_DELTA_MAX_ITEMS
        value: "250"
      - key: TEAMS_CHANNEL_SYNC_MAX_CHANNELS
        value: "3"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false

  - type: cron
    name: alleato-teams-dm-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "40 * * * *"
    dockerCommand: >-
      timeout 10m python3 src/scripts/run_graph_sync_phase.py teams-dm --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: GRAPH_DELTA_MAX_PAGES
        value: "3"
      - key: GRAPH_DELTA_MAX_ITEMS
        value: "250"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: TEAMS_DM_SYNC_MAX_USERS
        value: "1"
      - key: TEAMS_DM_EXPORT_PAGE_SIZE
        value: "25"
      - key: TEAMS_DM_EXPORT_MAX_PAGES
        value: "2"

  # Runs Outlook/OneDrive/SharePoint sync every 2 hours, staggered away from
  # Teams-only crons. Embedding is capped at 25 documents per run.
  - type: cron
    name: alleato-graph-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "20 */2 * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.integrations.microsoft_graph.sync import run_graph_sync;
      from src.services.supabase_helpers import get_supabase_client;
      result = run_graph_sync(
        get_supabase_client(),
        run_teams=False,
        run_embedding=True,
        run_teams_compiler=False,
        embed_limit=25,
        teams_compiler_batch_size=25,
      );
      print(json.dumps(result, indent=2));
      errors = result.get('errors', []);
      sys.exit(1 if errors and result.get('total_synced', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: GRAPH_DELTA_MAX_PAGES
        value: "3"
      - key: GRAPH_DELTA_MAX_ITEMS
        value: "250"
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: OUTLOOK_SYNC_MAX_USERS
        value: "1"
      - key: ONEDRIVE_SYNC_MAX_USERS
        value: "1"
      - key: ONEDRIVE_SYNC_MAX_FOLDERS
        value: "2"
      - key: SHAREPOINT_SYNC_MAX_FOLDERS
        value: "2"
      - key: GRAPH_SYNC_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "true"
      - key: GRAPH_SYNC_TEAMS
        value: "false"
      - key: GRAPH_SYNC_TEAMS_DM
        value: "false"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "true"
      - key: GRAPH_EMBEDDING_LIMIT
        value: "25"
      - key: TEAMS_COMPILER_BATCH_SIZE
        value: "25"

  - type: cron
    name: alleato-outlook-attachment-promotion
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "*/30 * * * *"
    dockerCommand: >-
      timeout 10m python3 src/scripts/promote_outlook_attachments.py --limit 25
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: OUTLOOK_ATTACHMENT_PROMOTION_LIMIT
        value: "25"

  - type: cron
    name: alleato-microsoft-executive-assistant-check
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "*/15 * * * *"
    dockerCommand: >-
      timeout 10m python3 src/scripts/run_microsoft_executive_assistant_check.py
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_SCHEDULED_ENABLED
        value: "true"
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_MAX_MESSAGES
        value: "25"
      - key: DEEP_AGENTS_MICROSOFT_EXECUTIVE_ASSISTANT_ENABLED
        value: "true"
      - key: DEEP_AGENTS_MICROSOFT_EXECUTIVE_ASSISTANT_MODEL
        value: gpt-5.4-mini
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_EXECUTIVE_ASSISTANT_MAILBOX
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false

  - type: web
    name: alleato-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com
      - key: ADMIN_API_KEY
        sync: false
      - key: FIREFLIES_API_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: RAG_SUPABASE_URL
        sync: false
      - key: RAG_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: RAG_DATABASE_WRITES_ENABLED
        value: "true"
      - key: RAG_DATABASE_READS_ENABLED
        value: "true"
      - key: ALLEATO_RUNTIME_ENV
        value: production
      - key: AI_GATEWAY_REQUIRED
        value: "true"
      - key: APP_DB_PRESSURE_GUARD_REQUIRED
        value: "true"
      # The web service should only serve API traffic. Background sync jobs run
      # as explicit Render cron services so they can be suspended/throttled.
      - key: DISABLE_SCHEDULER
        value: "true"
      - key: GRAPH_SYNC_ENABLED
        value: "false"
      - key: INTELLIGENCE_COMPILER_ENABLED
        value: "false"
      - key: SOURCE_SYNC_HEALTH_RECOMPUTE_ENABLED
        value: "false"
      - key: FIREFLIES_PIPELINE_BACKLOG_ENABLED
        value: "false"
      - key: TASK_EXTRACTION_ENABLED
        value: "false"
      # Deep full-transcript meeting extraction (Stage 3). Enabled in prod via the
      # Render API 2026-06-10; declared here so a Blueprint sync keeps it on.
      - key: DEEP_EXTRACTION_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "false"
      - key: GRAPH_SYNC_TEAMS
        value: "false"
      - key: GRAPH_SYNC_TEAMS_DM
        value: "false"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "false"
      - key: GRAPH_SYNC_INTERVAL_MINUTES
        value: 60
      - key: PIPELINE_MAX_CONCURRENCY
        value: 3
      - key: USE_UNIFIED_AGENT
        value: true
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_ENABLED
        value: true
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_RUNTIME
        value: deep_agents
      - key: DEEP_AGENTS_PROJECT_INTELLIGENCE_MODEL
        value: gpt-5.4-mini
      - key: LANGSMITH_TRACING
        value: "true"
      - key: LANGSMITH_PROJECT
        value: alleato-ai
      - key: LANGSMITH_DEPLOYMENT_NAME
        value: alleato-ai
      - key: LANGSMITH_API_KEY
