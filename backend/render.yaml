# Render deployment configuration
services:
  - type: cron
    name: alleato-acumatica-financial-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "15 0 * * *"
    dockerCommand: >-
      python3 -c "
      import json, os, sys;
      sys.path.insert(0, '/app');
      from src.services.acumatica_sync import run_acumatica_financial_sync;
      result = run_acumatica_financial_sync();
      print(json.dumps(result, indent=2));
      sys.exit(1 if result.get('errors') else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: ACUMATICA_BASE_URL
        sync: false
      - key: ACCOUNTING_USER
        sync: false
      - key: ACCOUNTING_PASSWORD
        sync: false
      - key: ACUMATICA_FINANCIAL_SYNC_ENABLED
        value: "true"

  - type: cron
    name: alleato-source-sync-health
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "*/15 * * * *"
    dockerCommand: >-
      python3 -c "
      import json, sys;
      sys.path.insert(0, '/app');
      from src.services.scheduler import _run_source_sync_health_recompute;
      result = _run_source_sync_health_recompute();
      print(json.dumps(result, indent=2));
      health = result.get('health', {});
      sys.exit(1 if health.get('status') != 'healthy' else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false

  - type: cron
    name: alleato-teams-channel-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "*/30 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false

  - type: cron
    name: alleato-teams-dm-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "15,45 * * * *"
    dockerCommand: >-
      timeout 25m python3 src/scripts/run_graph_sync_phase.py teams-dm --skip-embedding --skip-teams-compiler
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false

  # Runs Microsoft Graph sync every 30 minutes, staggered away from
  # teams-channel-sync at :00/:30. The service default caps embed_limit at 25.
  - type: cron
    name: alleato-graph-sync
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    schedule: "5,35 * * * *"
    dockerCommand: >-
      python3 -c "
      import json, os, sys;
      sys.path.insert(0, '/app');
      from src.services.supabase_helpers import get_supabase_client;
      from src.services.integrations.microsoft_graph.sync import run_graph_sync;
      client = get_supabase_client();
      result = run_graph_sync(client);
      print(json.dumps(result, indent=2));
      errors = result.get('errors', []);
      sys.exit(1 if errors and result.get('total_synced', 0) == 0 else 0)
      "
    envVars:
      - key: PYTHONPATH
        value: /app:/app/src:/app/src/services
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: GRAPH_SYNC_ENABLED
        value: "true"
      - key: GRAPH_SYNC_OUTLOOK
        value: "true"
      - key: GRAPH_SYNC_TEAMS
        value: "true"
      - key: GRAPH_SYNC_ONEDRIVE
        value: "true"

  - type: web
    name: alleato-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: FIREFLIES_API_KEY
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        sync: false
      - key: MICROSOFT_SYNC_USERS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ALLEATO_RUNTIME_ENV
        value: production
      - key: AI_GATEWAY_REQUIRED
        value: true
      # The web service should only serve API traffic. Background sync jobs run
      # as explicit Render cron services so they can be suspended/throttled.
      - key: DISABLE_SCHEDULER
        value: true
      - key: GRAPH_SYNC_ENABLED
        value: false
      - key: INTELLIGENCE_COMPILER_ENABLED
        value: false
      - key: SOURCE_SYNC_HEALTH_RECOMPUTE_ENABLED
        value: false
      - key: FIREFLIES_PIPELINE_BACKLOG_ENABLED
        value: false
      - key: TASK_EXTRACTION_ENABLED
        value: false
      - key: GRAPH_SYNC_OUTLOOK
        value: true
      - key: GRAPH_SYNC_TEAMS
        value: true
      - key: GRAPH_SYNC_TEAMS_DM
        value: true
      - key: GRAPH_SYNC_ONEDRIVE
        value: true
      - key: GRAPH_SYNC_INTERVAL_MINUTES
        value: 60
      - key: PIPELINE_MAX_CONCURRENCY
        value: 3
      - key: USE_UNIFIED_AGENT
        value: true
      - key: CORS_ORIGINS
        value: https://alleato-procore.vercel.app,https://www.alleato-procore.vercel.app
      # YokeFlow Agent Platform
      - key: DATABASE_URL
        sync: false  # PostgreSQL connection string for YokeFlow
      - key: CLAUDE_CODE_OAUTH_TOKEN
        sync: false  # Claude SDK authentication token
      - key: UI_PASSWORD
        sync: false  # Optional: Set to enable YokeFlow authentication
