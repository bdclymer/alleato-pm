name = "segment-enrichment"
main = "index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Cron: enrich new segments + snapshot risks daily at 2am UTC
[triggers]
crons = ["0 2 * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# Secrets (set via `wrangler secret put`):
# SUPABASE_URL
# SUPABASE_SERVICE_KEY
# OPENAI_API_KEY

[vars]
WORKER_NAME = "enrich"

[env.dev]
name = "segment-enrichment-dev"
