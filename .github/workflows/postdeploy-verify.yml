name: Post-Deploy Verify

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify deployment health and core auth behavior
        env:
          API_SMOKE_BASE_URL: ${{ secrets.API_SMOKE_BASE_URL }}
        run: bash scripts/postdeploy-verify.sh
