name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Auto-label every new issue with 'claude' so it's visible
  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['claude']
            });

  # Automatic PR review on every PR open/update
  review:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            Bash(git diff:*)
            Bash(git log:*)
            Bash(git show:*)
          prompt: |
            Review this pull request. Analyze the diff and provide a concise code review focusing on:
            1. Bugs or logic errors
            2. Security concerns
            3. Performance issues
            4. Code quality and maintainability

            Be concise. Only flag real issues — skip style nitpicks and minor formatting.
            If the PR looks good, say so briefly.

  # On-demand @claude interaction (interactive mode — no prompt)
  respond:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          assignee_trigger: 'claude'
          additional_permissions: |
            Edit
            Write
            Bash(*)
          claude_args: '--append-system-prompt "You are working on the Alleato PM codebase — a Next.js 15 + Supabase construction project management app. Frontend code is in frontend/src/. Use semantic color tokens (bg-background, text-foreground) — never hardcoded colors. Use [projectId] not [id] for dynamic route params. Import components from @/components/ui/ or @/components/ds/. Run cd frontend && npx tsc --noEmit to verify TypeScript before committing." --max-turns 20'

  # Auto-resolve new issues (automation mode — prompt includes issue content)
  auto-resolve:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    if: |
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && contains(github.event.issue.labels.*.name, 'claude'))
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            Edit
            Write
            Bash(*)
          claude_args: '--max-turns 25'
          prompt: |
            GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            Investigate the relevant code in this repository, implement the fix or feature described above, ensure TypeScript compiles without errors (cd frontend && npx tsc --noEmit), and create a PR with your changes.

            Key conventions:
            - Frontend code is in frontend/src/
            - Use semantic color tokens (bg-background, text-foreground) — never hardcoded colors
            - Use [projectId] not [id] for dynamic route params
            - Import components from @/components/ui/ or @/components/ds/
