name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  auth-check:
    runs-on: ubuntu-latest
    outputs:
      has_auth: ${{ steps.check.outputs.has_auth }}
    steps:
      - id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] || [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ]; then
            echo "has_auth=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_auth=false" >> "$GITHUB_OUTPUT"
          fi

  auto-label:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    if: github.event_name == 'issues' && github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['claude']
            });

  review:
    needs: auth-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    if: github.event_name == 'pull_request' && needs.auth-check.outputs.has_auth == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            Bash(git diff:*)
            Bash(git log:*)
            Bash(git show:*)
          prompt: |
            Review this pull request for the Alleato PM codebase (Next.js 15 + Supabase construction management app).

            Focus on:
            1. Bugs, logic errors, or data loss risks (especially silent field drops like budget_code_id → null)
            2. Security concerns (SQL injection, XSS, auth bypass)
            3. Design system violations (hardcoded colors, arbitrary spacing, missing semantic tokens)
            4. Route naming (must use [projectId] not [id])
            5. Type safety (no `any`, proper null checks)

            Be concise. Only flag real issues — skip style nitpicks.
            If the PR looks good, say so briefly.

  respond:
    needs: auth-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    if: |
      needs.auth-check.outputs.has_auth == 'true' &&
      ((github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')))
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          assignee_trigger: 'claude'
          additional_permissions: |
            Edit
            Write
            Bash(*)
          claude_args: '--max-turns 25'

  auto-resolve:
    needs: auth-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    if: |
      needs.auth-check.outputs.has_auth == 'true' &&
      ((github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && (contains(github.event.issue.labels.*.name, 'claude') || contains(github.event.issue.labels.*.name, 'admin-feedback'))))
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for existing branch (dedup)
        id: dedup
        run: |
          if git ls-remote --heads origin "claude/issue-${{ github.event.issue.number }}-*" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update feedback status
        if: steps.dedup.outputs.exists == 'false' && contains(github.event.issue.labels.*.name, 'admin-feedback')
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/admin_feedback_items?github_issue_number=eq.$ISSUE_NUMBER" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "diagnosing"}' || true

      - uses: anthropics/claude-code-action@v1
        if: steps.dedup.outputs.exists == 'false'
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            Edit
            Write
            Bash(*)
          claude_args: '--max-turns 30 --permission-mode bypassPermissions'
          prompt: |
            # Auto-resolve GitHub Issue #${{ github.event.issue.number }}

            **Title:** ${{ github.event.issue.title }}

            **Body:**
            ${{ github.event.issue.body }}

            ---

            ## Instructions

            You are working on the Alleato PM codebase — a Next.js 15 + Supabase construction project management app.

            ### Step 1: Diagnose
            - Read the issue carefully. If it contains an "Agent Context" section, use those file paths.
            - If it references a PRP, read it for intended behavior.
            - Identify the root cause by reading the relevant source files.

            ### Step 2: Fix
            - Make minimal, targeted changes. Don't refactor surrounding code.
            - Frontend code is in `frontend/src/`.
            - Use semantic color tokens (`bg-background`, `text-foreground`) — never hardcoded colors.
            - Use `[projectId]` not `[id]` for dynamic route params.
            - Import components from `@/components/ui/` or `@/components/ds/`.

            ### Step 3: Verify
            - Run `cd frontend && npx tsc --noEmit` to check TypeScript.
            - If the issue is about a UI feature, verify the fix makes logical sense.

            ### Step 4: Create PR
            - Create a branch named `claude/issue-${{ github.event.issue.number }}-{short-description}`.
            - Commit with a clear message referencing the issue: `Closes #${{ github.event.issue.number }}`.
            - Push and create a PR with a summary of what was fixed and why.

      - name: Update feedback status to in_review
        if: steps.dedup.outputs.exists == 'false' && contains(github.event.issue.labels.*.name, 'admin-feedback')
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/admin_feedback_items?github_issue_number=eq.$ISSUE_NUMBER" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "in_review"}' || true
