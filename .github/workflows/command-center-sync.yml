name: Command Center → GitHub Issue Sync

on:
  # Trigger via API from the Command Center UI or webhook
  repository_dispatch:
    types: [create-github-issue]
  # Also run on schedule to sync "in_progress" cards without issues
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours

permissions:
  issues: write
  contents: read

env:
  SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  sync-cards-to-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync initiative cards to GitHub issues
        uses: actions/github-script@v7
        with:
          script: |
            const SUPABASE_URL = process.env.SUPABASE_URL;
            const SUPABASE_KEY = process.env.SUPABASE_SERVICE_KEY;

            if (!SUPABASE_URL || !SUPABASE_KEY) {
              core.warning('Missing Supabase credentials — skipping sync');
              return;
            }

            // For repository_dispatch, sync a specific card
            if (context.eventName === 'repository_dispatch') {
              const { card_id, title, description, priority, labels } = context.payload.client_payload || {};
              if (!card_id || !title) {
                core.setFailed('Missing card_id or title in dispatch payload');
                return;
              }

              // Create GitHub issue
              const priorityLabel = `priority:${priority || 'medium'}`;
              const issueLabels = ['command-center', priorityLabel, ...(labels || [])];

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: [
                  description || '',
                  '',
                  '---',
                  `> Synced from [Command Center](${SUPABASE_URL.replace('.supabase.co', '')}/command-center)`,
                  `> Card ID: \`${card_id}\``,
                  `> Priority: **${priority || 'medium'}**`,
                ].join('\n'),
                labels: issueLabels.filter(Boolean),
              });

              core.info(`Created issue #${issue.number}: ${issue.html_url}`);

              // Update the initiative card with the GitHub issue URL
              const response = await fetch(
                `${SUPABASE_URL}/rest/v1/initiative_cards?id=eq.${card_id}`,
                {
                  method: 'PATCH',
                  headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Prefer': 'return=minimal',
                  },
                  body: JSON.stringify({
                    github_issue_url: issue.html_url,
                  }),
                }
              );

              if (!response.ok) {
                core.warning(`Failed to update card with issue URL: ${response.statusText}`);
              } else {
                core.info(`Updated card ${card_id} with issue URL`);
              }
              return;
            }

            // For scheduled runs, find in_progress cards without GitHub issues
            const cardsResponse = await fetch(
              `${SUPABASE_URL}/rest/v1/initiative_cards?status=eq.in_progress&github_issue_url=is.null&select=id,title,description,priority,labels`,
              {
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                },
              }
            );

            if (!cardsResponse.ok) {
              core.setFailed(`Failed to fetch cards: ${cardsResponse.statusText}`);
              return;
            }

            const cards = await cardsResponse.json();
            core.info(`Found ${cards.length} in-progress cards without GitHub issues`);

            for (const card of cards) {
              const priorityLabel = `priority:${card.priority || 'medium'}`;
              const issueLabels = ['command-center', priorityLabel, ...(card.labels || [])];

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: card.title,
                body: [
                  card.description || '',
                  '',
                  '---',
                  `> Auto-synced from Command Center`,
                  `> Card ID: \`${card.id}\``,
                  `> Priority: **${card.priority || 'medium'}**`,
                ].join('\n'),
                labels: issueLabels.filter(Boolean),
              });

              core.info(`Created issue #${issue.number} for card ${card.id}`);

              // Update card with issue URL
              await fetch(
                `${SUPABASE_URL}/rest/v1/initiative_cards?id=eq.${card.id}`,
                {
                  method: 'PATCH',
                  headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Prefer': 'return=minimal',
                  },
                  body: JSON.stringify({
                    github_issue_url: issue.html_url,
                  }),
                }
              );
            }

            core.info(`Sync complete: ${cards.length} issues created`);
