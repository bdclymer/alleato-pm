name: Guardrail PR Check

on:
  pull_request:

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Guardrail route coverage (changed files only)
        env:
          GUARDRAIL_BASE_REF: origin/${{ github.base_ref }}
        run: node scripts/check-changed-route-guardrails.mjs

      - name: Guardrail full-route debt gate
        env:
          GUARDRAIL_SCOPE: all
        run: node scripts/check-changed-route-guardrails.mjs
