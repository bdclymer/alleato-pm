name: Sync API Documentation

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      # Frontend API routes (Next.js App Router)
      - "frontend/src/app/api/**/*.ts"
      # Backend API endpoints (FastAPI)
      - "backend/src/api/**/*.py"

jobs:
  doc-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This PR modifies API endpoints. Please:

            1. Review the API changes in this PR by running:
               git diff origin/main...HEAD -- "frontend/src/app/api/" "backend/src/api/"

            2. For BACKEND changes (backend/src/api/):
               - Update backend/API.md with any new or changed endpoints
               - Maintain the existing table format (Method | Path | Description)
               - Add new sections if a new domain is introduced

            3. For FRONTEND changes (frontend/src/app/api/):
               - Identify new or modified Next.js API routes
               - Update docs/api-routes.md if it exists,
                 or create it with a summary of changed frontend API routes

            4. For each endpoint change, document:
               - HTTP method and path
               - Request body schema (if applicable)
               - Response shape
               - Authentication requirements
               - Any query parameters

            5. Verify consistency between frontend API routes and backend
               endpoints they proxy to.

            Use standard REST API documentation format with markdown tables.
            Commit any documentation updates to this PR branch.

          allowed_tools: "Read,Write,Edit,Bash(git diff*),Bash(git add*),Bash(git commit*),Glob,Grep"
