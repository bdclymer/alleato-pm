name: Auto-assign Claude to bug issues

on:
  issues:
    types: [labeled]

jobs:
  assign:
    # Trigger only when the feedback:bug label is added
    if: github.event.label.name == 'feedback:bug'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign to anthropic-claude-code
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              assignees: ['anthropic-claude-code'],
            });
