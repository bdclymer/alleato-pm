name: DB Migration Check

on:
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'frontend/src/types/database.types.ts'

jobs:
  check-types:
    name: Verify Types Match Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - run: supabase init
      - run: supabase db start

      - name: Verify generated types match schema
        run: |
          supabase gen types typescript --local > frontend/src/types/database.types.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet frontend/src/types/database.types.ts; then
            echo "::error::Generated types don't match committed types. Run: supabase gen types typescript --local > frontend/src/types/database.types.ts"
            git diff -- frontend/src/types/database.types.ts
            exit 1
          fi

      - if: always()
        run: supabase db stop
